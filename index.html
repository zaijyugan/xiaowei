    html, body { background:#F6F4EE; margin:0; padding:0; height:100%; overflow:hidden; }
    .qq * { box-sizing: border-box; }
    .qq {
      --bg:#F6F4EE; --panel:#FFFEFB; --panel2:#F1EEE6;
      --ink:#1C1A17; --soft:#6E6A61; --faint:#9C968A; --line:#E5E1D6;
      --terra:#A08252; --terra-soft:#F3EAD8; --olive:#6D7F5E; --olive-soft:#EEF0E7;
      --rust:#C24B33; --rust-soft:#F8EAE6; --gold:#A6690F; --warn-bg:#F7EFDF;
      --blue:#7D91A0; --blue-soft:#ECF0F3;
      --e1:#C3A06A; --e2:#E5C99F; --e3:#EDE7DA;
      --safetop:0px;
      font-family:-apple-system,'PingFang SC','Microsoft YaHei',system-ui,sans-serif;
      color:var(--ink); background:var(--bg); -webkit-font-smoothing:antialiased;
      position:fixed; inset:0; display:flex; flex-direction:column; overflow:hidden;
    }
    .qq .serif { font-family:'Songti SC','Noto Serif SC','Noto Serif CJK SC',Georgia,serif; letter-spacing:.01em; }
    .qq .micro { font-size:10px; letter-spacing:.2em; font-weight:700; }
    .qq .nums { font-variant-numeric:tabular-nums; font-feature-settings:'tnum'; }
    .qq .topbar { flex:none; height:var(--safetop); background:var(--bg); z-index:100; }
    .qq .scroll { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; }
    .qq .wrap { max-width:480px; margin:0 auto; padding:14px 18px 110px; }
    .qq .statusbar-guard { display:none; }
    .qq .fade { animation:qfade .5s both; }
    @keyframes qfade { from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }
    .qq .card { background:var(--panel); border:none; border-radius:16px; }
    .qq input, .qq select, .qq button { font-family:inherit; }
    .qq .fld { width:100%; box-sizing:border-box; min-width:0; -webkit-appearance:none; appearance:none; background:var(--panel2); border:1px solid transparent; border-radius:12px; padding:10px 12px; font-size:15px; color:var(--ink); outline:none; }
    .qq input[type=date].fld { min-height:41px; }
    .qq .fld:focus { border-color:var(--terra); background:#fff; }
    .qq .tap { transition:transform .12s ease, opacity .12s ease; }
    .qq .tap:active { transform:scale(.96); opacity:.85; }
    .qq .bar { height:10px; border-radius:6px; transition:width .6s cubic-bezier(.2,.7,.2,1); }
    .qq .stack { transition:width .6s cubic-bezier(.2,.7,.2,1); }
    .qq .ring { transition:stroke-dashoffset .9s cubic-bezier(.2,.7,.2,1); }
    .qq .sheet { animation:qsheet .3s both; }
